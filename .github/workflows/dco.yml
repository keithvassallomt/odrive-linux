name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every commit on this PR is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          range="$BASE_SHA..$HEAD_SHA"
          while read -r sha; do
            if ! git log -1 --format=%B "$sha" \
              | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              author=$(git log -1 --format='%an <%ae>' "$sha")
              subject=$(git log -1 --format=%s "$sha")
              echo "::error::Missing Signed-off-by on $sha ($author): $subject"
              missing=$((missing + 1))
            fi
          done < <(git rev-list "$range")
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "Fix with: git commit --amend -s --no-edit  (single commit)"
            echo "    or: git rebase --signoff $BASE_SHA  (multi-commit)"
            echo "Then force-push the branch."
            exit 1
          fi
